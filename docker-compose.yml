services:
  postgres:
    image: postgres:16
    container_name: jobqueue-postgres
    environment:
      POSTGRES_DB: jobqueue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobqueue"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
